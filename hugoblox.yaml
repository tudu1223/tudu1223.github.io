build:
  hugo_version: '0.162.0'
deploy:
  # Deployment target: github-pages, netlify, vercel, cloudflare, or none
  host: 'github-pages'
template:
  id: "academic-cv"
  name: "Academic CV"

# === Web Identity ===
baseURL: 'https://tudu1223.github.io/'
title: 'Sky Huang · Research & Notes'
defaultContentLanguage: 'en'
defaultContentLanguageInSubdir: false
hasCJKLanguage: true

# === Descriptions ===
params:
  description: |
    Sky Huang — Undergraduate researcher at Fujian Agriculture and Forestry University.
    AI for Science, single-cell transcriptomics and gene regulatory network (GRN) inference.
  keywords: ['AI4Science', 'GRN inference', 'single-cell transcriptomics', 'Sky Huang']
  author: 'Sky Huang'
  email: 'sk_hwong@outlook.com'
