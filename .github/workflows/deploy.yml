name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow one concurrent deployment, queueing newer runs.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Go (for Hugo module downloads)
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install pnpm via npm
        # Use plain npm to install pnpm — avoids the `pnpm/action-setup` PATH issue.
        run: npm install -g pnpm@10

      - name: Install Hugo (Extended)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.162.0'
          extended: true

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENABLEGITINFO: true
        run: |
          hugo mod tidy
          hugo --gc --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
