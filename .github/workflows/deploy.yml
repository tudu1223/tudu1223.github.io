name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow one concurrent deployment, queueing newer runs.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go (for Hugo module downloads)
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Hugo (Extended)
        uses: peaceiris/actions-hugo@v3
        with:
          # We develop locally on 0.160.x — pinning CI to the same minor to
          # avoid surprises in the css.TailwindCSS pipeline when new Hugo
          # minors ship.
          hugo-version: '0.160.1'
          extended: true

      - name: Install npm dependencies (Tailwind v4 / Pagefind)
        # Hugo Blox processes Tailwind at build time via @tailwindcss/cli;
        # running `npm install` keeps the toolchain compatible with whichever
        # runner Node version is currently in use.
        run: npm install

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENABLEGITINFO: true
        # Note: do NOT run `hugo mod tidy` here. Our go.mod/go.sum are committed
        # and the runner picks them up via `peaceiris/actions-hugo`. Tidy would
        # rewrite versions and risk pulling a newer Hugo Blox release that is
        # incompatible with the local theme assets.
        run: |
          hugo --gc --minify --printPathWarnings

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
