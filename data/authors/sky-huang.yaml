bio: |
  Undergraduate researcher at Fujian Agriculture and Forestry University (FAFU),
  working at the intersection of single-cell transcriptomics and gene regulatory
  network (GRN) inference. I integrate multi-omics data with high
  physical-confidence evidence to design principled algorithms and to build
  rigorous benchmarks for GRN inference — broadly interested in AI for Science.

  福建农林大学本科生，专注于单细胞转录组学与基因调控网络（GRN）推断；
  结合多组学与高物理置信度数据，开展算法构建与精准基准评估。

